name: sponsorbot

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sponsorbot
      POSTGRES_USER: sponsorbot
      POSTGRES_PASSWORD: sponsorbot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sponsorbot -d sponsorbot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://sponsorbot:sponsorbot@db:5432/sponsorbot
      JWT_SECRET: dev
      ENCRYPTION_KEY: devkey
      STORAGE_DIR: /data
      # Add your production frontend domains (comma separated). Keep localhost entries for dev.
      CORS_ORIGINS: "https://heptabot.heptapusgroup.com,https://sponsorbot.heptapusgroup.com,http://localhost:5173,http://127.0.0.1:5173"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - sponsorbot_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - default
      - caddy_net

  worker:
    build: ./backend
    command: celery -A app.celery_app:celery_app worker -l info
    environment:
      DATABASE_URL: postgresql+psycopg://sponsorbot:sponsorbot@db:5432/sponsorbot
      JWT_SECRET: dev
      ENCRYPTION_KEY: devkey
      STORAGE_DIR: /data
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - sponsorbot_data:/data
    restart: unless-stopped

  beat:
    build: ./backend
    command: celery -A app.celery_app:celery_app beat -l info
    environment:
      DATABASE_URL: postgresql+psycopg://sponsorbot:sponsorbot@db:5432/sponsorbot
      JWT_SECRET: dev
      ENCRYPTION_KEY: devkey
      STORAGE_DIR: /data
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_started
    volumes:
      - sponsorbot_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: sponsorbot-frontend:latest
    environment:
      VITE_API_URL: https://sponsorbot.heptapusgroup.com
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - caddy_net

networks:
  caddy_net:
    name: ${CADDY_NETWORK_NAME:-worldpass-real_default}
    external: true

volumes:
  sponsorbot_data:
  db_data:
